<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Envelope</title>
    <!-- Link to the CSS file -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Envelope container -->
    <div id="envelope-container">
        <!-- Envelope -->
        <div id="envelope">
            <div id="band"></div>
        </div>
        <!-- Matchstick -->
        <div id="matchstick-container">
            <div id="matchstick">
                <div id="head"></div>
                <div id="body"></div>
            </div>
        </div>
    </div>

    <!-- Hidden card -->
    <div id="card" class="hidden">
        <div id="page1" class="card-page"><img src="img1.png" alt="Page 1"></div>
        <div id="page2" class="card-page hidden"><img src="img2.png" alt="Page 2"></div>
        <div id="page3" class="card-page hidden"><img src="img3.png" alt="Page 3"></div>
    </div>

    <!-- Link to the JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
